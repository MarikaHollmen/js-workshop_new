<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> // Responsive design for mobile devices
    <title>Finding Elements</title>
</head>
<body>

    <!-- One element with unique ID -->
    <h1 id="unique-id">My Unique Heading</h1>

    <p class="info-text">First info paragraph.</p>

    <p class="info-text">Second info paragraph.</p>

    <div>A simple div.</div>

    <ul>
        <li>List item 1</li>
        <li>List item 2</li>
    </ul>

    <script>
        // Get the element with the unique ID
        const uniqueHeading = document.getElementById('unique-id');
        console.log('Element by ID:', uniqueHeading.textContent); 

        // Get all elements with the class name 'HTMLCollection'
        const infoParagraphs = document.getElementsByClassName('info-text');
        console.log('Elements by Class Name:', infoParagraphs[0].textContent); // Access first element in the collection

        // Get all <p> elements using getElementsByTagName
            const allParagraphs = document.getElementsByTagName('p');
            console.log('Elements by Tag Name (all paragraphs):', allParagraphs.length); // Logs the number of <p> elements
        
        // Query Selector (first match)
        const firstDiv = document.querySelector('div');
        console.log('First Div by Query Selector:', firstDiv.textContent);

        // Query Selector All (returns NodeList)
        const allListItems = document.querySelectorAll('li');
        console.log('All List Items by Query Selector All:', allListItems.length); // Logs the number of <li> elements
    </script>
</body>
</html>
