<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Compatibility</title>
</head>
<body>
    <button id="compatBtn">Compatible Click</button>
    <script>
        var btn = document.getElementById('compatBtn');
        function compatClick() { alert('Compatible!'); }            
        // Check for support
        
        if(window.addEventListener) {
            btn.addEventListener('click', compatClick);// Modern browsers
        }
        else if(window.attachEvent) {
            btn.attachEvent('onclick', compatClick); // IE8 and earlier
        }
        
    </script>

    <hr>
    <p><a href="index.html">← Back to Workshop 3 Menu</a></p>
    

</body>
</html>
