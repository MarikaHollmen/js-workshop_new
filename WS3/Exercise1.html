<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Events Example</title>
</head>
<body>
    <h1>Common Events Demonstration</h1>
    <p>Page loaded! ( Onload event)</p>

     <input type="text" id="myInput"
        onchange="alert ('Input changed!')"
        placeholder="Type then click outside">
    <button onclick="alert('Button clicked!')">Click Me</button>

    <p onmouseover="this.style.color='red'" onmouseout="this.style.color='black'">Hover over me!</p>
    <script>
        //runs when the page finishes loading
        window.onload = function() {
            document.body.innerHTML+='<p>JavaScript onload event triggered!</p>';
        };
    </script>

    <hr>
    <p><a href="index.html">← Back to Workshop 3 Menu</a></p>

</body>
</html>
